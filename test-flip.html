<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻转测试</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            margin: 0;
        }

        .flip-card {
            width: 250px;
            height: 250px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flip-card:hover .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .flip-card-front {
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flip-card-front svg {
            width: 100%;
            height: 100%;
        }

        .flip-card-back {
            transform: rotateY(180deg);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .flip-card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>将鼠标移到圆圈上查看翻转效果</h1>
    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="100" cy="100" r="90" fill="#FF6B9D"/>
                    <text x="100" y="120" font-size="60" fill="white" text-anchor="middle" font-weight="bold">権</text>
                </svg>
            </div>
            <div class="flip-card-back">
                <img src="profile.jpg" alt="Profile Photo">
            </div>
        </div>
    </div>
</body>
</html>
